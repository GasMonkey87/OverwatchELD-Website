<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OverWatch ELD - VTC Management</title>
<style>
:root{--line:#334155;--text:#f8fafc;--muted:#94a3b8}
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#020617,#0f172a);color:var(--text)}
.layout{display:flex;min-height:100vh}
.sidebar{width:250px;background:#020617;border-right:1px solid var(--line);padding:18px;position:fixed;inset:0 auto 0 0}
.brand{font-size:22px;font-weight:800}.subbrand{color:var(--muted);font-size:13px;margin-bottom:20px}
.nav button{width:100%;background:transparent;border:1px solid transparent;color:var(--text);padding:13px;text-align:left;border-radius:12px;cursor:pointer;margin-bottom:7px;font-size:15px}
.nav button:hover,.nav button.active{background:#0f172a;border-color:#1e3a8a}
.main{margin-left:250px;padding:24px;width:calc(100% - 250px)}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:20px}
.badge{background:#082f49;color:#7dd3fc;border:1px solid #0ea5e9;padding:7px 10px;border-radius:999px;font-size:13px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px}
.card{background:rgba(15,23,42,.92);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 15px 35px rgba(0,0,0,.22)}
.card h2,.card h3{margin-top:0}.muted{color:var(--muted)}
input,textarea,select{width:100%;background:#020617;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:11px;margin:6px 0 12px}
textarea{min-height:110px;resize:vertical}
button.primary{background:linear-gradient(135deg,#0284c7,#2563eb);color:white;border:none;border-radius:12px;padding:11px 15px;cursor:pointer;font-weight:700}
button.secondary{background:#1f2937;color:white;border:1px solid var(--line);border-radius:12px;padding:10px 14px;cursor:pointer}
button.danger{background:#7f1d1d;color:white;border:1px solid #ef4444;border-radius:12px;padding:10px 14px;cursor:pointer}
.list-item{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:13px;border-bottom:1px solid var(--line);cursor:pointer}
.list-item:hover{background:#1e293b}
.avatar{width:46px;height:46px;border-radius:50%;background:#334155;object-fit:cover}
.row{display:flex;gap:12px;align-items:center}
.table{width:100%;border-collapse:collapse}.table th,.table td{padding:11px;border-bottom:1px solid var(--line);text-align:left}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:20;padding:30px}
.modal-card{max-width:620px;margin:5vh auto;background:#020617;border:1px solid var(--line);border-radius:20px;padding:22px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.notice{padding:12px;border-radius:12px;background:#172554;border:1px solid #1d4ed8;margin-bottom:14px}
.error{padding:12px;border-radius:12px;background:#450a0a;border:1px solid #dc2626;margin-bottom:14px}
.successbox{padding:12px;border-radius:12px;background:#052e16;border:1px solid #22c55e;color:#bbf7d0;margin-top:12px}
.preview-strip{display:grid;grid-template-columns:90px 1fr;gap:12px;align-items:center;background:#020617;border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0 16px}.preview-logo{width:72px;height:72px;border-radius:16px;border:1px solid var(--line);object-fit:cover;background:#0f172a}.preview-company-pic{width:100%;max-height:190px;border-radius:16px;border:1px solid var(--line);object-fit:cover;background:#020617;margin-top:8px}.hint{font-size:12px;color:var(--muted);margin:-6px 0 10px}
@media(max-width:850px){.sidebar{position:relative;width:100%;height:auto}.layout{display:block}.main{margin-left:0;width:100%}}
</style>
</head>

<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">OverWatch ELD</div>
    <div class="subbrand">VTC Management Center</div>
    <div class="nav">
      <button data-page="dashboard" onclick="route('dashboard')">Dashboard</button>
      <button data-page="drivers" onclick="route('drivers')">Drivers</button>
      <button data-page="fleet" onclick="route('fleet')">Fleet</button>
      <button data-page="garage" onclick="route('garage')">Garage</button>
      <button data-page="portal" onclick="route('portal')">Edit Portal</button>
      <button onclick="openPortalPage()">Open Portal</button>
      <button data-page="settings" onclick="route('settings')">Settings</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h1 id="pageTitle">Dashboard</h1>
        <div class="muted" id="guildLine">Loading VTC...</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <button class="secondary" onclick="openPortalPage()">Open Portal</button>
        <div class="badge" id="statusBadge">Connecting...</div>
      </div>
    </div>
    <div id="content"></div>
  </main>
</div>

<div id="modal" class="modal" onclick="closeModal(event)">
  <div class="modal-card" id="modalBody"></div>
</div>

<script>
const API = location.origin.includes("localhost")
  ? "https://overwatcheld.up.railway.app"
  : location.origin;

const qs = new URLSearchParams(location.search);
let guildId = qs.get("guildId") || localStorage.getItem("oweld.guildId") || "";
let portalData = {};

if (guildId) localStorage.setItem("oweld.guildId", guildId);

function esc(v){
  return String(v ?? "").replace(/[&<>"']/g, s => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"
  }[s]));
}
function jsObj(o){ return esc(JSON.stringify(o)); }

function openPortalPage(){
  if(!guildId){
    alert("No VTC selected.");
    return;
  }
  window.open(`/portal.html?guildId=${encodeURIComponent(guildId)}`, "_blank");
}

async function api(path, options={}){
  const res = await fetch(`${API}${path}`, {
    ...options,
    credentials:"include",
    headers:{ "Content-Type":"application/json", ...(options.headers || {}) }
  });

  let json = null;
  try{ json = await res.json(); }catch{}

  if(!res.ok || json?.ok === false){
    throw new Error(json?.error || json?.message || `HTTP ${res.status}`);
  }
  return json || {};
}

function setStatus(text, good=true){
  const el = document.getElementById("statusBadge");
  el.textContent = text;
  el.style.borderColor = good ? "#0ea5e9" : "#ef4444";
  el.style.color = good ? "#7dd3fc" : "#fecaca";
  el.style.background = good ? "#082f49" : "#450a0a";
}

function setActive(page){
  document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("active", b.dataset.page === page));
}

function setTitle(page){
  document.getElementById("pageTitle").textContent = {
    dashboard:"Dashboard",drivers:"Drivers",fleet:"Fleet",garage:"Garage",portal:"Edit Portal",settings:"Settings"
  }[page] || "Management";
}

function normalizeDriver(d){
  return {
    id: d.id || d.Id || d.discordUserId || d.DiscordUserId || d.userId || "",
    name: d.name || d.Name || d.driverName || d.displayName || d.discordUsername || d.DiscordUsername || "Driver",
    role: d.role || d.Role || d.vtcRole || "Driver",
    status: d.status || d.Status || "Member",
    discordUserId: d.discordUserId || d.DiscordUserId || d.userId || "",
    discordUsername: d.discordUsername || d.DiscordUsername || d.username || "",
    discordAvatarUrl: d.discordAvatarUrl || d.DiscordAvatarUrl || d.avatarUrl || d.imageUrl || d.ImageUrl || "",
    assignedTruck: d.assignedTruck || d.AssignedTruck || d.truck || "",
    totalMiles: d.totalMiles || d.TotalMiles || d.milesTotal || d.miles || d.mileage || d.Mileage || "0",
    bio: d.bio || d.Bio || ""
  };
}

function lowerPortalData(d){
  return {
    guildId: d.guildId || d.GuildId || guildId,
    siteTitle: d.siteTitle || d.SiteTitle || "",
    companyName: d.companyName || d.CompanyName || d.siteTitle || d.SiteTitle || "",
    welcomeText: d.welcomeText || d.WelcomeText || "",
    companyInfo: d.companyInfo || d.CompanyInfo || "",
    logoImageUrl: d.logoImageUrl || d.LogoImageUrl || d.logoUrl || d.LogoUrl || "",
    companyPictureUrl: d.companyPictureUrl || d.CompanyPictureUrl || d.companyImageUrl || d.CompanyImageUrl || "",
    bannerImageUrl: d.bannerImageUrl || d.BannerImageUrl || d.companyBannerUrl || d.CompanyBannerUrl || "",
    heroImageUrl: d.heroImageUrl || d.HeroImageUrl || "",
    joinDiscordUrl: d.joinDiscordUrl || d.JoinDiscordUrl || "",
    learnMoreUrl: d.learnMoreUrl || d.LearnMoreUrl || "",
    latestInfo: d.latestInfo || d.LatestInfo || [],
    featuredDrivers: d.featuredDrivers || d.FeaturedDrivers || [],
    selectedFeaturedDriver: d.selectedFeaturedDriver || d.SelectedFeaturedDriver || "",
    drivers: d.drivers || d.Drivers || [],
    trucks: d.trucks || d.Trucks || [],
    garages: d.garages || d.Garages || []
  };
}

async function loadPortalData(){
  if(!guildId) throw new Error("Missing guildId. Open manage.html?guildId=YOUR_SERVER_ID");
  const json = await api(`/api/vtc/portal/data?guildId=${encodeURIComponent(guildId)}`);
  portalData = lowerPortalData(json.data || {});
  document.getElementById("guildLine").textContent = `${portalData.companyName || portalData.siteTitle || "VTC"} · Guild ${guildId}`;
  return portalData;
}

async function loadRosterDrivers(){
  try{
    const r = await api(`/api/vtc/roster?guildId=${encodeURIComponent(guildId)}`);
    return (r.data || r.drivers || r.roster || []).map(normalizeDriver);
  }catch{
    return [];
  }
}

async function getMergedDrivers(){
  const portal = await loadPortalData();
  const portalDrivers = (portal.drivers || []).map(normalizeDriver);
  const rosterDrivers = await loadRosterDrivers();
  const merged = [];

  rosterDrivers.forEach(r=>{
    const existing = portalDrivers.find(p =>
      p.discordUserId && r.discordUserId && p.discordUserId === r.discordUserId
    );
    merged.push(existing ? {...r, ...existing} : r);
  });

  portalDrivers.forEach(p=>{
    const exists = merged.find(m =>
      (m.discordUserId && p.discordUserId && m.discordUserId === p.discordUserId) ||
      (m.id && p.id && m.id === p.id)
    );
    if(!exists) merged.push(p);
  });

  return merged;
}

async function safeLoad(fn){
  try{
    setStatus("Syncing...", true);
    await fn();
    setStatus("Live", true);
  }catch(e){
    setStatus("Error", false);
    document.getElementById("content").innerHTML = `<div class="error"><b>Failed:</b> ${esc(e.message)}</div>`;
  }
}

function route(page){
  setActive(page);
  setTitle(page);
  if(page === "dashboard") safeLoad(loadDashboard);
  if(page === "drivers") safeLoad(loadDrivers);
  if(page === "fleet") safeLoad(loadFleet);
  if(page === "garage") safeLoad(loadGarage);
  if(page === "portal") safeLoad(loadPortal);
  if(page === "settings") loadSettings();
}

async function loadDashboard(){
  const portal = await loadPortalData();
  const drivers = await getMergedDrivers();
  const trucks = portal.trucks || [];
  const garages = portal.garages || [];
  const featured = drivers.find(d =>
    d.id === portal.selectedFeaturedDriver ||
    d.discordUserId === portal.selectedFeaturedDriver
  );

  document.getElementById("content").innerHTML = `
    <div class="grid">
      <div class="card"><h3>Drivers</h3><div style="font-size:36px;font-weight:800">${drivers.length}</div><div class="muted">Merged Discord roster + portal drivers</div></div>
      <div class="card"><h3>Fleet</h3><div style="font-size:36px;font-weight:800">${trucks.length}</div><div class="muted">Saved company trucks</div></div>
      <div class="card"><h3>Garages</h3><div style="font-size:36px;font-weight:800">${garages.length}</div><div class="muted">Saved garage locations</div></div>
      <div class="card"><h3>Featured Driver</h3><div style="font-size:22px;font-weight:800">${esc(featured?.name || "Not selected")}</div><div class="muted">Shown on portal after portal upgrade</div></div>
    </div>
    <div class="card" style="margin-top:16px">
      <h3>${esc(portal.companyName || portal.siteTitle || "Company")} Info</h3>
      <p>${esc(portal.companyInfo || portal.welcomeText || "No portal company information saved yet.")}</p>
      <div class="actions"><button class="primary" onclick="window.open('/portal.html?guildId=${esc(guildId)}','_blank')">Open Portal</button></div>
    </div>
  `;
}

async function loadDrivers(){
  const drivers = await getMergedDrivers();

  document.getElementById("content").innerHTML = `
    <div class="notice">
      Drivers are merged from Discord/VTC roster and saved portal profiles. Portal edits override roster data.
    </div>
    <div class="card">
      <h2>Drivers</h2>
      <div class="actions">
        <button class="primary" onclick="openDriverForm()">Add Portal Driver</button>
      </div>
      ${drivers.length ? drivers.map(d=>`
        <div class="list-item" onclick='openDriverDetails(${jsObj(d)})'>
          <div class="row">
            <img class="avatar" src="${esc(d.discordAvatarUrl)}" onerror="this.style.display='none'">
            <div><b>${esc(d.name)}</b><div class="muted">${esc(d.role)} · ${esc(d.status)} · ${esc(d.discordUserId)}</div></div>
          </div>
          <div>${esc(d.totalMiles)} miles</div>
        </div>
      `).join("") : `<div class="muted">No drivers found from portal or live roster API.</div>`}
    </div>
  `;
}

function openDriverDetails(d){
  document.getElementById("modalBody").innerHTML = `
    <div class="row">
      <img class="avatar" src="${esc(d.discordAvatarUrl)}" onerror="this.style.display='none'">
      <div><h2 style="margin:0">${esc(d.name)}</h2><div class="muted">${esc(d.discordUsername || d.discordUserId)}</div></div>
    </div>
    <hr style="border-color:#334155;margin:18px 0">
    <div class="grid">
      <div class="card"><b>Role</b><br>${esc(d.role)}</div>
      <div class="card"><b>Status</b><br>${esc(d.status)}</div>
      <div class="card"><b>Total Miles</b><br>${esc(d.totalMiles)}</div>
      <div class="card"><b>Truck</b><br>${esc(d.assignedTruck)}</div>
    </div>
    <p class="muted">${esc(d.bio)}</p>
    <div class="actions">
      <button class="primary" onclick='openDriverForm(${jsObj(d)})'>Save/Edit In Portal</button>
      <button class="secondary" onclick="setFeaturedDriver('${esc(d.discordUserId || d.id)}')">Set Featured Driver</button>
      ${d.id ? `<button class="danger" onclick="deleteDriver('${esc(d.id)}')">Delete Portal Driver</button>` : ""}
      <button class="secondary" onclick="modal.style.display='none'">Close</button>
    </div>
  `;
  modal.style.display = "block";
}

function openDriverForm(d={}){
  document.getElementById("modalBody").innerHTML = `
    <h2>${d.id ? "Edit Driver" : "Add Driver"}</h2>
    <input id="driverId" type="hidden" value="${esc(d.id || "")}">
    <input id="driverName" placeholder="Driver Name" value="${esc(d.name || "")}">
    <input id="driverRole" placeholder="Role" value="${esc(d.role || "Driver")}">
    <input id="driverStatus" placeholder="Status" value="${esc(d.status || "Member")}">
    <input id="driverDiscordUserId" placeholder="Discord User ID" value="${esc(d.discordUserId || "")}">
    <input id="driverDiscordUsername" placeholder="Discord Username" value="${esc(d.discordUsername || "")}">
    <input id="driverDiscordAvatarUrl" placeholder="Avatar URL" value="${esc(d.discordAvatarUrl || "")}">
    <input id="driverAssignedTruck" placeholder="Assigned Truck" value="${esc(d.assignedTruck || "")}">
    <input id="driverTotalMiles" placeholder="Total Miles" value="${esc(d.totalMiles || "")}">
    <textarea id="driverBio" placeholder="Bio">${esc(d.bio || "")}</textarea>
    <div class="actions">
      <button class="primary" onclick="saveDriver()">Save Driver</button>
      <button class="secondary" onclick="modal.style.display='none'">Cancel</button>
    </div>
  `;
  modal.style.display = "block";
}

async function saveDriver(){
  const driver = {
    id: driverId.value,
    name: driverName.value,
    role: driverRole.value,
    status: driverStatus.value,
    discordUserId: driverDiscordUserId.value,
    discordUsername: driverDiscordUsername.value,
    discordAvatarUrl: driverDiscordAvatarUrl.value,
    assignedTruck: driverAssignedTruck.value,
    totalMiles: driverTotalMiles.value,
    mileage: driverTotalMiles.value,
    bio: driverBio.value
  };

  await api(`/api/vtc/portal/drivers?guildId=${encodeURIComponent(guildId)}`, {
    method:"POST", body:JSON.stringify(driver)
  });

  modal.style.display = "none";
  route("drivers");
}

async function deleteDriver(id){
  if(!id || !confirm("Delete this portal driver?")) return;
  await api(`/api/vtc/portal/drivers/${encodeURIComponent(id)}?guildId=${encodeURIComponent(guildId)}`, { method:"DELETE" });
  modal.style.display = "none";
  route("drivers");
}

async function setFeaturedDriver(driverKey){
  const current = await loadPortalData();
  await api(`/api/vtc/portal/settings`, {
    method:"POST",
    body:JSON.stringify({...current, guildId, selectedFeaturedDriver:driverKey})
  });
  modal.style.display = "none";
  alert("Featured driver updated.");
  route("dashboard");
}

async function loadFleet(){
  const json = await api(`/api/vtc/portal/fleet?guildId=${encodeURIComponent(guildId)}`);
  const trucks = json.data || [];

  document.getElementById("content").innerHTML = `
    <div class="card">
      <h2>Fleet</h2>
      <div class="actions"><button class="primary" onclick="openTruckForm()">Add Truck</button></div>
      <table class="table">
        <thead><tr><th>Truck #</th><th>Name/Model</th><th>Driver</th><th>Plate</th><th>Odometer</th><th>Status</th><th></th></tr></thead>
        <tbody>
        ${trucks.length ? trucks.map(t=>`
          <tr>
            <td>${esc(t.truckNumber || "")}</td><td>${esc(t.name || t.model || "")}</td><td>${esc(t.driver || "Unassigned")}</td><td>${esc(t.plate || "")}</td><td>${esc(t.odometer || "")}</td><td>${esc(t.status || "Available")}</td>
            <td><button class="secondary" onclick='openTruckForm(${jsObj(t)})'>Edit</button> <button class="danger" onclick="deleteTruck('${esc(t.id || "")}')">Delete</button></td>
          </tr>
        `).join("") : `<tr><td colspan="7" class="muted">No trucks saved yet.</td></tr>`}
        </tbody>
      </table>
    </div>
  `;
}

async function openTruckForm(t={}){
  const drivers = await getMergedDrivers();
  const currentDriver = t.driver || "";

  document.getElementById("modalBody").innerHTML = `
    <h2>${t.id ? "Edit Truck" : "Add Truck"}</h2>
    <input id="truckId" type="hidden" value="${esc(t.id || "")}">
    <input id="truckNumber" placeholder="Truck Number" value="${esc(t.truckNumber || "")}">
    <input id="truckName" placeholder="Truck Name" value="${esc(t.name || "")}">
    <input id="truckModel" placeholder="Model" value="${esc(t.model || "")}">
    <label>Assigned Driver</label>
    <select id="truckDriver">
      <option value="">Unassigned</option>
      ${drivers.map(d=>`<option value="${esc(d.name)}" ${d.name === currentDriver ? "selected" : ""}>${esc(d.name)}</option>`).join("")}
    </select>
    <input id="truckPlate" placeholder="Plate" value="${esc(t.plate || "")}">
    <input id="truckOdometer" placeholder="Odometer" value="${esc(t.odometer || "")}">
    <input id="truckLocation" placeholder="Location" value="${esc(t.location || "")}">
    <input id="truckStatus" placeholder="Status" value="${esc(t.status || "Available")}">
    <input id="truckCondition" placeholder="Condition %" value="${esc(t.condition || "")}">
    <input id="truckFuel" placeholder="Fuel %" value="${esc(t.fuel || "")}">
    <textarea id="truckNotes" placeholder="Notes">${esc(t.notes || "")}</textarea>
    <div class="actions"><button class="primary" onclick="saveTruck()">Save Truck</button><button class="secondary" onclick="modal.style.display='none'">Cancel</button></div>
  `;
  modal.style.display = "block";
}

async function saveTruck(){
  const truck = {
    id:truckId.value, truckNumber:truckNumber.value, name:truckName.value, model:truckModel.value,
    driver:truckDriver.value, plate:truckPlate.value, odometer:truckOdometer.value,
    location:truckLocation.value, status:truckStatus.value, condition:truckCondition.value,
    fuel:truckFuel.value, notes:truckNotes.value
  };

  await api(`/api/vtc/portal/fleet?guildId=${encodeURIComponent(guildId)}`, {
    method:"POST", body:JSON.stringify(truck)
  });

  modal.style.display = "none";
  route("fleet");
}

async function deleteTruck(id){
  if(!id || !confirm("Delete this truck?")) return;
  await api(`/api/vtc/portal/fleet/${encodeURIComponent(id)}?guildId=${encodeURIComponent(guildId)}`, { method:"DELETE" });
  route("fleet");
}

async function loadGarage(){
  const json = await api(`/api/vtc/portal/garages?guildId=${encodeURIComponent(guildId)}`);
  const garages = json.data || [];

  document.getElementById("content").innerHTML = `
    <div class="card">
      <h2>Garages</h2>
      <div class="actions"><button class="primary" onclick="openGarageForm()">Add Garage</button></div>
      ${garages.length ? garages.map(g=>`
        <div class="list-item">
          <div><b>${esc(g.city || "Garage")}${g.state ? ", " + esc(g.state) : ""}</b><div class="muted">${esc(g.country || "")} · ${esc(g.slots || "0")} slots · $${esc(g.cost || "0")}</div></div>
          <div class="actions"><button class="secondary" onclick='openGarageForm(${jsObj(g)})'>Edit</button><button class="danger" onclick="deleteGarage('${esc(g.id || "")}')">Delete</button></div>
        </div>
      `).join("") : `<div class="muted">No garages saved yet.</div>`}
    </div>
  `;
}

function openGarageForm(g={}){
  document.getElementById("modalBody").innerHTML = `
    <h2>${g.id ? "Edit Garage" : "Add Garage"}</h2>
    <input id="garageId" type="hidden" value="${esc(g.id || "")}">
    <input id="garageCity" placeholder="City" value="${esc(g.city || "")}">
    <input id="garageState" placeholder="State" value="${esc(g.state || "")}">
    <input id="garageCountry" placeholder="Country" value="${esc(g.country || "")}">
    <input id="garageSlots" placeholder="Slots" value="${esc(g.slots || "")}">
    <input id="garageCost" placeholder="Cost" value="${esc(g.cost || "")}">
    <input id="garagePurchasedBy" placeholder="Purchased By" value="${esc(g.purchasedBy || "")}">
    <textarea id="garageNotes" placeholder="Notes">${esc(g.notes || "")}</textarea>
    <div class="actions"><button class="primary" onclick="saveGarage()">Save Garage</button><button class="secondary" onclick="modal.style.display='none'">Cancel</button></div>
  `;
  modal.style.display = "block";
}

async function saveGarage(){
  const garage = {
    id:garageId.value, city:garageCity.value, state:garageState.value, country:garageCountry.value,
    slots:garageSlots.value, cost:garageCost.value, purchasedBy:garagePurchasedBy.value, notes:garageNotes.value
  };

  await api(`/api/vtc/portal/garages?guildId=${encodeURIComponent(guildId)}`, {
    method:"POST", body:JSON.stringify(garage)
  });

  modal.style.display = "none";
  route("garage");
}

async function deleteGarage(id){
  if(!id || !confirm("Delete this garage?")) return;
  await api(`/api/vtc/portal/garages/${encodeURIComponent(id)}?guildId=${encodeURIComponent(guildId)}`, { method:"DELETE" });
  route("garage");
}

function loadSettings(){
  document.getElementById("content").innerHTML = `
    <div class="card">
      <h2>Settings</h2>
      <label>Guild ID</label>
      <input id="guildInput" value="${esc(guildId)}">
      <div class="actions">
        <button class="primary" onclick="saveSettings()">Save</button>
        <button class="danger" onclick="clearSettings()">Clear</button>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <h2>Discord Auto Setup</h2>
      <p class="muted">
        Automatically create the Discord category, channels, and webhooks needed for OverWatch ELD.
      </p>

      <label>Category Name</label>

      <label>Dispatch Channel</label>

async function autoSetupDiscord(){
  const status = document.getElementById("autoSetupStatus");
  const result = document.getElementById("autoSetupResult");

  if(!guildId){
    status.textContent = "Missing Guild ID. Save your Guild ID first.";
    return;
  }

  status.textContent = "Creating Discord category, channels, and webhooks...";
  result.innerHTML = "";

  try{
    const json = await api(`/api/vtc/setup/auto-discord`, {
      method:"POST",
      body:JSON.stringify({
        guildId,
        categoryName:autoCategoryName.value || "OverWatch ELD",
        dispatchChannelName:autoDispatchChannelName.value || "dispatch-center",
        announcementsChannelName:autoAnnouncementsChannelName.value || "announcements",
        bolChannelName:autoBolChannelName.value || "bol-documents",
        systemLogChannelName:autoSystemLogChannelName.value || "system-logs"
      })
    });

    status.textContent = "Discord auto setup complete.";

    const channels = json.channels || {};
    result.innerHTML = `
      <div class="successbox">
        <b>Created / Verified Discord Setup</b><br><br>
        Dispatch: ${esc(channels.dispatch?.name || channels.dispatch?.id || "created")}<br>
        Announcements: ${esc(channels.announcements?.name || channels.announcements?.id || "created")}<br>
        BOL: ${esc(channels.bol?.name || channels.bol?.id || "created")}<br>
        System Logs: ${esc(channels.systemLogs?.name || channels.systemLogs?.id || "created")}<br>
      </div>
    `;
  }catch(e){
    status.textContent = "Auto setup failed: " + e.message;
    result.innerHTML = `<div class="error"><b>Failed:</b> ${esc(e.message)}</div>`;
  }
}

function saveSettings(){
  guildId = guildInput.value.trim();
  localStorage.setItem("oweld.guildId", guildId);
  location.href = `/manage.html?guildId=${encodeURIComponent(guildId)}`;
}

function clearSettings(){
  localStorage.removeItem("oweld.guildId");
  location.href = "/manage.html";
}


async function loadManageAccess(){
  let meResp;
  try{
    meResp = await api('/api/auth/me');
  }catch(e){
    const returnTo = encodeURIComponent(location.pathname + location.search);
    location.href = `/login.html?returnTo=${returnTo}`;
    return false;
  }

  let vtcsResp;
  try{
    vtcsResp = await api('/api/auth/vtcs');
  }catch(e){
    document.getElementById('content').innerHTML = `<div class="error"><b>Unable to verify VTC admin access.</b><br>${esc(e.message)}</div>`;
    setStatus('Auth error', false);
    return false;
  }

  const vtcs = Array.isArray(vtcsResp.data) ? vtcsResp.data : [];
  const managerVtcs = vtcs.filter(v => v && v.isManager === true);

  if(!guildId){
    if(managerVtcs.length === 1){
      guildId = String(managerVtcs[0].guildId || '');
      localStorage.setItem('oweld.guildId', guildId);
      location.href = `/manage.html?guildId=${encodeURIComponent(guildId)}`;
      return false;
    }

    document.getElementById('guildLine').textContent = 'Choose a VTC to manage';
    document.getElementById('content').innerHTML = `
      <div class="card">
        <h2>Select VTC</h2>
        <p class="muted">Your Discord account can manage these VTCs.</p>
        ${managerVtcs.length ? managerVtcs.map(v => `
          <div class="list-item" onclick="location.href='/manage.html?guildId=${encodeURIComponent(v.guildId)}'">
            <div>
              <b>${esc(v.vtcName || v.guildId)}</b><br>
              <span class="muted">Role: ${esc(v.role || 'Manager')} · Guild ${esc(v.guildId)}</span>
            </div>
            <button class="primary">Manage</button>
          </div>
        `).join('') : `<div class="error"><b>No manageable VTCs found.</b><br>Your /api/auth/vtcs response did not include any VTC with isManager=true.</div>`}
      </div>`;
    setStatus(managerVtcs.length ? 'Select VTC' : 'Not admin', managerVtcs.length > 0);
    return false;
  }

  const selected = vtcs.find(v => String(v.guildId || '') === String(guildId));
  if(!selected){
    document.getElementById('guildLine').textContent = `Guild ${guildId}`;
    document.getElementById('content').innerHTML = `
      <div class="error">
        <b>This VTC is not available to your Discord login.</b><br>
        Log out/in with the Discord account that owns or manages this server.<br><br>
        <button class="secondary" onclick="clearSettings()">Choose different VTC</button>
      </div>`;
    setStatus('No access', false);
    return false;
  }

  if(selected.isManager !== true){
    document.getElementById('guildLine').textContent = `${esc(selected.vtcName || 'VTC')} · Guild ${esc(guildId)}`;
    document.getElementById('content').innerHTML = `
      <div class="error">
        <b>You are logged in, but you are not a VTC admin for this server.</b><br>
        Detected role: <b>${esc(selected.role || 'Driver')}</b><br><br>
        Your /api/auth/vtcs entry must have <code>isManager:true</code> to open management.
      </div>`;
    setStatus('Not admin', false);
    return false;
  }

  localStorage.setItem('oweld.guildId', guildId);
  window.currentVtcAccess = selected;
  setStatus(`Admin: ${selected.role || 'Manager'}`, true);
  return true;
}

async function bootManage(){
  const allowed = await loadManageAccess();
  if(!allowed) return;
  route('dashboard');

  setInterval(()=>{
    const active = document.querySelector('.nav button.active')?.dataset.page;
    if(active && modal.style.display !== 'block') route(active);
  }, 30000);
}

function closeModal(e){
  if(e.target.id === "modal") modal.style.display = "none";
}

bootManage();
</script>
