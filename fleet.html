<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OverWatch Fleet</title><style>body{margin:0;background:#020617;color:#f8fafc;font-family:Segoe UI,Arial}.wrap{padding:24px;max-width:1200px;margin:auto}.top{display:flex;justify-content:space-between;gap:12px;align-items:center}.nav a{color:#bfdbfe;text-decoration:none;margin-left:10px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}.card{background:#0f172a;border:1px solid #334155;border-radius:18px;padding:16px}.muted{color:#94a3b8}.big{font-size:30px;font-weight:800}.row{display:flex;justify-content:space-between;border-top:1px solid #334155;padding:12px 0}.pill{background:#082f49;border:1px solid #0ea5e9;color:#7dd3fc;padding:5px 9px;border-radius:999px}</style></head><body><div class="wrap"><div class="top"><div><h1>Fleet</h1><div id="sub" class="muted">ATS + Discord fleet snapshot</div></div><div class="nav"><a id="map">Live Map</a><a id="convoy">Convoy</a><a id="garages">Garages</a><a id="loads">Loads</a><a id="portal">Portal</a></div></div><div id="content" class="grid"></div><div id="list" class="card" style="margin-top:14px"></div></div><script>
const qs=new URLSearchParams(location.search);const guildId=qs.get('guildId')||localStorage.getItem('oweld.guildId')||'';if(guildId)localStorage.setItem('oweld.guildId',guildId);['map','convoy','garages','loads','portal'].forEach(id=>document.getElementById(id).href=`/${id==='map'?'live-map':id}.html?guildId=${encodeURIComponent(guildId)}`);function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]))}async function j(u){const r=await fetch(u,{credentials:'include'});return await r.json()}function age(t){if(!t)return'';const s=Math.max(0,Math.round((Date.now()-new Date(t).getTime())/1000));return s<60?s+'s ago':Math.round(s/60)+'m ago'}
async function boot(){if(!guildId){sub.textContent='Missing guildId';return}const live=await j(`/api/map/live?guildId=${encodeURIComponent(guildId)}`);let portal={};try{portal=(await j(`/api/vtc/portal/data?guildId=${encodeURIComponent(guildId)}`)).data||{}}catch{}const pts=live.points||[];const saved=portal.trucks||portal.Trucks||[];content.innerHTML=`<div class="card"><div class="muted">Live Trucks</div><div class="big">${pts.length}</div></div><div class="card"><div class="muted">Saved Fleet</div><div class="big">${saved.length}</div></div><div class="card"><div class="muted">Telemetry Source</div><div class="big">${esc(live.source||'live')}</div></div>`;list.innerHTML=`<h2>Live ATS Units</h2>${pts.length?pts.map(p=>`<div class="row"><div><b>${esc(p.truck||p.truckName||p.truckNumber||'Truck')}</b><div class="muted">${esc(p.driverName||'Driver')} · ${esc(p.location||'')} · ${esc(p.dutyStatus||'Live')}</div></div><div><span class="pill">${Math.round(Number(p.speedMph||0))} mph</span><div class="muted">${age(p.updatedUtc||p.lastSeenUtc)}</div></div></div>`).join(''):'<div class="muted">No ATS telemetry trucks online.</div>'}<h2 style="margin-top:24px">Saved Fleet</h2>${saved.length?saved.map(t=>`<div class="row"><div><b>${esc(t.truckNumber||t.name||t.model||'Truck')}</b><div class="muted">${esc(t.driver||'Unassigned')} · ${esc(t.plate||'')} · ${esc(t.status||'')}</div></div><div>${esc(t.odometer||'')}</div></div>`).join(''):'<div class="muted">No saved fleet records.</div>'}`}
boot();setInterval(boot,10000)</script></body></html>
