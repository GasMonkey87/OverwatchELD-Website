<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OverWatch Loads</title><style>body{margin:0;background:#020617;color:#f8fafc;font-family:Segoe UI,Arial}.wrap{padding:24px;max-width:1200px;margin:auto}.top{display:flex;justify-content:space-between}.nav a{color:#bfdbfe;text-decoration:none;margin-left:10px}.card{background:#0f172a;border:1px solid #334155;border-radius:18px;padding:16px;margin-top:14px}.muted{color:#94a3b8}.row{display:grid;grid-template-columns:1.2fr 1.2fr .9fr .7fr;gap:10px;border-top:1px solid #334155;padding:12px 0}@media(max-width:800px){.row{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="top"><div><h1>Loads</h1><div class="muted">Active ATS load telemetry + dispatch context</div></div><div class="nav"><a id="map">Live Map</a><a id="fleet">Fleet</a><a id="convoy">Convoy</a><a id="garages">Garages</a></div></div><div id="content" class="card"></div></div><script>
const qs=new URLSearchParams(location.search);const guildId=qs.get('guildId')||localStorage.getItem('oweld.guildId')||'';if(guildId)localStorage.setItem('oweld.guildId',guildId);['map','fleet','convoy','garages'].forEach(id=>document.getElementById(id).href=`/${id==='map'?'live-map':id}.html?guildId=${encodeURIComponent(guildId)}`);function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]))}async function boot(){const r=await fetch(`/api/map/live?guildId=${encodeURIComponent(guildId)}`,{credentials:'include'});const d=await r.json();const pts=(d.points||[]).filter(p=>p.sourceCity||p.destinationCity||p.sourceCompany||p.destinationCompany||p.cargo||p.loadNumber);content.innerHTML=`<h2>Active Loads</h2>${pts.length?`<div class="row muted"><b>Driver / Truck</b><b>Pickup → Delivery</b><b>Cargo / Load</b><b>Status</b></div>`+pts.map(p=>`<div class="row"><div><b>${esc(p.driverName||'Driver')}</b><br><span class="muted">${esc(p.truck||'Truck')}</span></div><div>${esc(p.sourceCompany||'-')} ${esc(p.sourceCity||'')}<br><span class="muted">to ${esc(p.destinationCompany||'-')} ${esc(p.destinationCity||'')}</span></div><div>${esc(p.cargo||'-')}<br><span class="muted">${esc(p.loadNumber||'')}</span></div><div>${esc(p.dutyStatus||'Live')}<br><span class="muted">${Math.round(Number(p.speedMph||0))} mph</span></div></div>`).join(''):'<div class="muted">No active ATS load telemetry. Start or accept an ATS job and make sure ELD is posting telemetry.</div>'}`}
boot();setInterval(boot,7000)</script></body></html>
