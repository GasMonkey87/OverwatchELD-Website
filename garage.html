<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Garage</title><style>body{font-family:Segoe UI,Arial;background:#08111d;color:#f2f7ff;margin:0}.container{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:24px 0}.top{background:#07111f;border-bottom:1px solid #ffffff1a}.btn{display:inline-block;padding:10px 14px;border:1px solid #ffffff1a;border-radius:12px;color:#fff;text-decoration:none;background:#ffffff12}.primary{background:#5865F2}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.card{background:#0d1626;border:1px solid #ffffff1a;border-radius:18px;padding:18px}.muted{color:#9eb1c9}input,textarea{width:100%;padding:11px;border-radius:10px;border:1px solid #ffffff1a;background:#0004;color:#fff;margin:5px 0}@media(max-width:900px){.grid{grid-template-columns:1fr}}</style></head><body><div class="top"><div class="container"><a class="btn" id="portal">Portal</a></div></div><main class="container"><h1>Company Garage</h1><div class="card" id="adminBox"><h2>Add Garage</h2><input id="city" placeholder="City"><input id="state" placeholder="State/Country"><input id="slots" placeholder="Slots"><input id="cost" placeholder="Cost"><textarea id="notes" placeholder="Notes"></textarea><button class="btn primary" id="save">Save Garage</button></div><p class="muted" id="summary">Loading garages...</p><div class="grid" id="grid"></div></main><script>
(async()=>{const q=n=>new URL(location.href).searchParams.get(n)||'',guildId=q('guildId'),e=id=>document.getElementById(id),esc=v=>String(v||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));e('portal').href='/portal.html?guildId='+encodeURIComponent(guildId);async function load(){let d=await fetch('/api/vtc/portal/garages?guildId='+encodeURIComponent(guildId),{credentials:'include'}).then(r=>r.json()).catch(()=>({data:[]}));let garages=Array.isArray(d.data)?d.data:[];e('summary').textContent=garages.length+' garage'+(garages.length===1?'':'s')+' listed.';e('grid').innerHTML=garages.length?garages.map(g=>'<div class="card"><h3>'+esc(g.city||'Garage')+'</h3><p class="muted">Region: '+esc(g.state||g.country||'-')+'</p><p class="muted">Slots: '+esc(g.slots||'-')+'</p><p class="muted">Cost: '+esc(g.cost||'-')+'</p><p class="muted">'+esc(g.notes||'')+'</p></div>').join(''):'<div class="muted">No garages added yet.</div>'}e('save').onclick=async()=>{let garage={city:e('city').value,state:e('state').value,slots:e('slots').value,cost:e('cost').value,notes:e('notes').value};await fetch('/api/vtc/portal/garages?guildId='+encodeURIComponent(guildId),{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify(garage)});await load()};await load()})();
</script></body></html>
