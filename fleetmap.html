<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Fleet Live Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; }
#map { height:100vh; width:100%; }
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([39.5,-98.5],4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap'
}).addTo(map);

var markers = {};

async function updateDrivers()
{
    try{
        const res = await fetch('/api/location/latest');
        const drivers = await res.json();

        drivers.forEach(d => {

            if(!markers[d.driverId])
            {
                markers[d.driverId] = L.marker([d.lat,d.lon]).addTo(map)
                    .bindPopup(d.name);
            }
            else
            {
                markers[d.driverId].setLatLng([d.lat,d.lon]);
            }

        });
    }
    catch(e){}
}

setInterval(updateDrivers,3000);
updateDrivers();

</script>

</body>
</html>
