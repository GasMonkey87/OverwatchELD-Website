<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OverWatch Garages</title><style>body{margin:0;background:#020617;color:#f8fafc;font-family:Segoe UI,Arial}.wrap{padding:24px;max-width:1200px;margin:auto}.top{display:flex;justify-content:space-between}.nav a{color:#bfdbfe;text-decoration:none;margin-left:10px}.card{background:#0f172a;border:1px solid #334155;border-radius:18px;padding:16px;margin-top:14px}.muted{color:#94a3b8}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}</style></head><body><div class="wrap"><div class="top"><div><h1>Garages</h1><div class="muted">Company garage records from portal management</div></div><div class="nav"><a id="map">Live Map</a><a id="fleet">Fleet</a><a id="convoy">Convoy</a><a id="loads">Loads</a></div></div><div id="content" class="grid"></div></div><script>
const qs=new URLSearchParams(location.search);const guildId=qs.get('guildId')||localStorage.getItem('oweld.guildId')||'';if(guildId)localStorage.setItem('oweld.guildId',guildId);['map','fleet','convoy','loads'].forEach(id=>document.getElementById(id).href=`/${id==='map'?'live-map':id}.html?guildId=${encodeURIComponent(guildId)}`);function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]))}async function boot(){let garages=[];try{const r=await fetch(`/api/vtc/portal/garages?guildId=${encodeURIComponent(guildId)}`,{credentials:'include'});const d=await r.json();garages=d.data||[]}catch{}content.innerHTML=garages.length?garages.map(g=>`<div class="card"><h2>${esc(g.city||'Garage')}${g.state?', '+esc(g.state):''}</h2><div class="muted">${esc(g.country||'')}</div><p>Slots: <b>${esc(g.slots||0)}</b></p><p>Cost: <b>$${esc(g.cost||0)}</b></p><p>Purchased By: ${esc(g.purchasedBy||'-')}</p><p class="muted">${esc(g.notes||'')}</p></div>`).join(''):'<div class="card muted">No garages saved yet. Add garages in Manage VTC → Garage.</div>'}boot();setInterval(boot,30000)</script></body></html>
