<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OverWatch Convoy</title><style>body{margin:0;background:#020617;color:#f8fafc;font-family:Segoe UI,Arial}.wrap{padding:24px;max-width:1200px;margin:auto}.top{display:flex;justify-content:space-between}.nav a{color:#bfdbfe;text-decoration:none;margin-left:10px}.card{background:#0f172a;border:1px solid #334155;border-radius:18px;padding:16px;margin-top:14px}.muted{color:#94a3b8}.row{display:flex;justify-content:space-between;border-top:1px solid #334155;padding:12px 0}.leader{border-color:#22c55e}</style></head><body><div class="wrap"><div class="top"><div><h1>Convoy</h1><div class="muted">Live ATS convoy grouping by pickup/delivery</div></div><div class="nav"><a id="map">Live Map</a><a id="fleet">Fleet</a><a id="garages">Garages</a><a id="loads">Loads</a></div></div><div id="content"></div></div><script>
const qs=new URLSearchParams(location.search);const guildId=qs.get('guildId')||localStorage.getItem('oweld.guildId')||'';if(guildId)localStorage.setItem('oweld.guildId',guildId);['map','fleet','garages','loads'].forEach(id=>document.getElementById(id).href=`/${id==='map'?'live-map':id}.html?guildId=${encodeURIComponent(guildId)}`);function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]))}async function boot(){const r=await fetch(`/api/map/live?guildId=${encodeURIComponent(guildId)}`,{credentials:'include'});const d=await r.json();const pts=d.points||[];const groups={};for(const p of pts){const key=[p.sourceCity||'Open Road',p.destinationCity||'Unknown Destination'].join(' → ');(groups[key]??=[]).push(p)}content.innerHTML=Object.keys(groups).length?Object.entries(groups).map(([k,arr])=>`<div class="card"><h2>${esc(k)}</h2>${arr.map((p,i)=>`<div class="row ${i===0?'leader':''}"><div><b>${i===0?'Lead · ':''}${esc(p.driverName||'Driver')}</b><div class="muted">${esc(p.truck||'Truck')} · ${esc(p.dutyStatus||'Live')} · ${esc(p.location||'')}</div></div><div>${Math.round(Number(p.speedMph||0))} mph</div></div>`).join('')}</div>`).join(''):'<div class="card muted">No live convoy telemetry.</div>'}boot();setInterval(boot,7000)</script></body></html>
